<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Valve Control</title>
    
    <!-- Google Fonts for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --glow-green: 0 0 20px rgba(16, 185, 129, 0.4);
            --glow-red: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Main Container Card */
        .control-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Status Indicator */
        .status-container {
            margin-bottom: 2.5rem;
            position: relative;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: var(--text-muted);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* Dynamic Status Colors (You can toggle these classes via JS or Django) */
        .status-open .status-dot { background-color: var(--accent-green); box-shadow: var(--glow-green); }
        .status-open .status-badge { border-color: var(--accent-green); color: var(--accent-green); }
        
        .status-closed .status-dot { background-color: var(--accent-red); box-shadow: var(--glow-red); }
        .status-closed .status-badge { border-color: var(--accent-red); color: var(--accent-red); }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        button {
            position: relative;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        /* Button 1: Urine Detected (Green) */
        button[name="action"][value="urine"] {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        button[name="action"][value="urine"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
        }

        button[name="action"][value="urine"]:active {
            transform: translateY(0);
        }

        /* Button 2: Not Urine (Red) */
        button[name="action"][value="noturine"] {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        button[name="action"][value="noturine"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.5);
        }

        button[name="action"][value="noturine"]:active {
            transform: translateY(0);
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .control-card {
                padding: 2rem;
                margin: 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="control-card">
        <h1>Urine Valve Control</h1>
        <div class="subtitle">System Status Monitor</div>

        <!-- Status Display -->
        <div class="status-container">
            <!-- 
               NOTE: You can add logic here to add classes like 'status-open' or 'status-closed' 
               based on your {{status.state}} value. 
               For now, it defaults to a neutral state.
            -->
            <div class="status-badge">
                <span class="status-dot"></span>
                {{status.state}}
            </div>
        </div>

        <!-- Controls -->
        <form method="POST">
            {% csrf_token %}

            <div class="btn-group">
                <button name="action" value="urine">
                    <i class="fa-solid fa-droplet"></i>
                    Urine Detected
                </button>

                <button name="action" value="noturine">
                    <i class="fa-solid fa-ban"></i>
                    Not Urine
                </button>
            </div>
        </form>
    </div>

</body>
</html>
